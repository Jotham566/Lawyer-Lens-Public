<?xml version="1.0" encoding="UTF-8"?>
<!--
  Law Lens — Wordmark SVG master
  Artboard  : 1000 × 280
  Typeface  : Plus Jakarta Sans 500 (loaded via Google Fonts)
  Note      : Convert text to outlines in Figma/Illustrator before
              final export for font-independent production files.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1000" height="280"
     viewBox="0 0 1000 280">

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500&amp;display=swap');
    </style>

    <!-- Knock out the 'l' slot so the cursor sits cleanly on top -->
    <mask id="law-mask">
      <rect width="1000" height="280" fill="white"/>
      <!-- 'l' bounding box: x=62 to x=114.8, full ascent to baseline -->
      <rect x="62" y="40" width="49.5" height="158" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" fill="#fcf9f8"/>

  <!-- "law" — 'l' slot knocked out by mask -->
  <text
    x="62" y="193"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-size="198"
    font-weight="500"
    letter-spacing="0"
    fill="#000c1e"
    mask="url(#law-mask)">law</text>

  <!-- "lens" — untouched; Plus Jakarta Sans 'l' has a curved foot,
       distinguishing it clearly from I and 1 -->
  <text
    x="503.4" y="193"
    font-family="'Plus Jakarta Sans', sans-serif"
    font-size="198"
    font-weight="500"
    letter-spacing="0"
    fill="#000c1e">lens</text>

  <!-- Gold dot separator — the only accent colour -->
  <circle cx="436.1" cy="141.5" r="11.5" fill="#e9c176"/>

  <!-- I-beam cursor replacing 'l' in "law"
       Stem weight (16.8px) matches the visual stroke of PJS 500 at 198px.
       Crossbars span 90% of the 'l' advance width. -->
  <g transform="translate(-4 0)">
    <!-- vertical stem -->
    <rect x="79.95" y="46.5" width="16.8" height="146.5" rx="8.4" fill="#000c1e">
    </rect>
    <!-- top crossbar -->
    <rect x="64.65" y="46.5" width="47.5" height="15.8" rx="7.9" fill="#000c1e">
    </rect>
    <!-- bottom crossbar -->
    <rect x="64.65" y="177.2" width="47.5" height="15.8" rx="7.9" fill="#000c1e">
    </rect>
  </g>

</svg>
