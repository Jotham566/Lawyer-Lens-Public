<?xml version="1.0" encoding="UTF-8"?>
<!--
  Law Lens — Favicon Master · Dark  |  1024×1024
  Dot bottom aligned to cursor baseline (CUR_BOT).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="1024" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#002344"/>
      <stop offset="1" stop-color="#000c1e"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <g fill="#ffffff">
    <animate
      attributeName="opacity"
      dur="1.2s"
      repeatCount="indefinite"
      values="1;1;0;0;1"
      keyTimes="0;0.45;0.5;0.95;1"
    />
    <!-- Vertical stem -->
    <rect x="254.4" y="112" width="99.4" height="736" rx="49.7"/>
    <!-- Top crossbar -->
    <rect x="125.1" y="112" width="357.7" height="99.4" rx="49.7"/>
    <!-- Bottom crossbar -->
    <rect x="125.1" y="748.6" width="357.7" height="99.4" rx="49.7"/>
  </g>
  <!-- Gold full stop — bottom (774.4+73.6=848) = cursor bottom (26.5×32=848) -->
  <circle cx="611.6" cy="774.4" r="73.6" fill="#e9c176"/>
</svg>
